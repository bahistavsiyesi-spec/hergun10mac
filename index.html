<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bahis Analiz Motoru</title>

<style>

body{
font-family: Arial;
background:#0b0f1a;
color:white;
text-align:center;
padding:40px;
}

button{
background:#00ff87;
color:black;
border:none;
padding:15px 30px;
font-size:18px;
cursor:pointer;
border-radius:10px;
}

button:hover{
opacity:0.8;
}

#sonuc{
margin-top:40px;
text-align:left;
background:#111827;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<h1>⚽ Bahis Analiz Motoru</h1>

<p>AI + İstatistik + H2H Analizi</p>

<button onclick="analiz()">Derin Analiz Başlat</button>

<div id="sonuc">Sonuç burada görünecek...</div>

<script>

async function analiz(){

document.getElementById("sonuc").innerText="Analiz yapılıyor..."

let r = await fetch("https://hergun10mac.onrender.com/analyze",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
match_limit:10
})

})

let data = await r.json()

if(data.tips.length==0){

document.getElementById("sonuc").innerText="Bugün uygun maç bulunamadı."

return
}

document.getElementById("sonuc").innerText=
JSON.stringify(data,null,2)

}

</script>

</body>
</html>
