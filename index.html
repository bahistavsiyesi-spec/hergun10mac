<!DOCTYPE html>
<html>
<head>
<title>Bahis Asistanı</title>
</head>

<body>

<h1>Bahis Analiz Motoru</h1>

<button onclick="analiz()">Derin Analiz Başlat</button>

<pre id="sonuc"></pre>

<script>

async function analiz(){

let r = await fetch("https://hergun10mac.onrender.com/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
match_limit:10
})
})

let data = await r.json()

document.getElementById("sonuc").innerText =
JSON.stringify(data,null,2)

}

</script>

</body>
</html>
